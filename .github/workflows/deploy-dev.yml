name: Deploy to Dev

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: foji-ai-api-dev
  APP_RUNNER_SERVICE: foji-ai-api-dev
  SSM_PREFIX: /foji/dev/ai-api/

jobs:
  deploy:
    name: Build & Deploy to Dev (App Runner)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repository if missing
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPOSITORY 2>/dev/null || \
            aws ecr create-repository --repository-name $ECR_REPOSITORY --image-scanning-configuration scanOnPush=true

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy to App Runner (create or update)
        env:
          IMAGE: ${{ steps.build-image.outputs.image }}
        run: |
          IMAGE_CONFIG='{
            "RuntimeEnvironmentVariables": {
              "ENVIRONMENT": "production",
              "PORT": "8000",
              "AWS_REGION": "'"$AWS_REGION"'",
              "AWS_DYNAMODB_TABLE": "foji-chats-dev",
              "AWS_S3_BUCKET": "foji-files-dev"
            },
            "RuntimeEnvironmentSecrets": {
              "DATABASE_URL": "arn:aws:ssm:'"$AWS_REGION"':${{ secrets.AWS_ACCOUNT_ID }}:parameter'"$SSM_PREFIX"'DATABASE_URL",
              "INTERNAL_API_KEY": "arn:aws:ssm:'"$AWS_REGION"':${{ secrets.AWS_ACCOUNT_ID }}:parameter'"$SSM_PREFIX"'INTERNAL_API_KEY",
              "OPENAI_API_KEY": "arn:aws:ssm:'"$AWS_REGION"':${{ secrets.AWS_ACCOUNT_ID }}:parameter'"$SSM_PREFIX"'OPENAI_API_KEY",
              "GEMINI_API_KEY": "arn:aws:ssm:'"$AWS_REGION"':${{ secrets.AWS_ACCOUNT_ID }}:parameter'"$SSM_PREFIX"'GEMINI_API_KEY",
              "CORS_ORIGINS": "arn:aws:ssm:'"$AWS_REGION"':${{ secrets.AWS_ACCOUNT_ID }}:parameter'"$SSM_PREFIX"'CORS_ORIGINS"
            },
            "Port": "8000"
          }'

          SERVICE_ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='${{ env.APP_RUNNER_SERVICE }}'].ServiceArn" \
            --output text)

          if [ -z "$SERVICE_ARN" ] || [ "$SERVICE_ARN" = "None" ]; then
            echo "Creating new App Runner service..."
            aws apprunner create-service \
              --service-name ${{ env.APP_RUNNER_SERVICE }} \
              --source-configuration '{
                "AuthenticationConfiguration": {
                  "AccessRoleArn": "${{ secrets.APP_RUNNER_ECR_ROLE_ARN }}"
                },
                "AutoDeploymentsEnabled": false,
                "ImageRepository": {
                  "ImageIdentifier": "'"$IMAGE"'",
                  "ImageRepositoryType": "ECR",
                  "ImageConfiguration": '"$IMAGE_CONFIG"'
                }
              }' \
              --instance-configuration '{
                "Cpu": "0.25 vCPU",
                "Memory": "0.5 GB",
                "InstanceRoleArn": "${{ secrets.APP_RUNNER_INSTANCE_ROLE_ARN }}"
              }' \
              --health-check-configuration '{
                "Protocol": "HTTP",
                "Path": "/health",
                "Interval": 20,
                "Timeout": 5,
                "HealthyThreshold": 1,
                "UnhealthyThreshold": 3
              }'
          else
            echo "Updating existing App Runner service..."
            aws apprunner update-service \
              --service-arn "$SERVICE_ARN" \
              --source-configuration '{
                "AuthenticationConfiguration": {
                  "AccessRoleArn": "${{ secrets.APP_RUNNER_ECR_ROLE_ARN }}"
                },
                "AutoDeploymentsEnabled": false,
                "ImageRepository": {
                  "ImageIdentifier": "'"$IMAGE"'",
                  "ImageRepositoryType": "ECR",
                  "ImageConfiguration": '"$IMAGE_CONFIG"'
                }
              }' \
              --instance-configuration '{
                "InstanceRoleArn": "${{ secrets.APP_RUNNER_INSTANCE_ROLE_ARN }}"
              }'
          fi

      - name: Wait for App Runner to stabilize
        run: |
          SERVICE_ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='${{ env.APP_RUNNER_SERVICE }}'].ServiceArn" \
            --output text)
          for i in $(seq 1 30); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "$SERVICE_ARN" \
              --query "Service.Status" --output text)
            echo "Status: $STATUS (attempt $i/30)"
            if [ "$STATUS" = "RUNNING" ]; then
              URL=$(aws apprunner describe-service \
                --service-arn "$SERVICE_ARN" \
                --query "Service.ServiceUrl" --output text)
              echo "## Dev Deployment" >> $GITHUB_STEP_SUMMARY
              echo "**URL**: https://$URL" >> $GITHUB_STEP_SUMMARY
              exit 0
            fi
            sleep 20
          done
          echo "Deployment timed out" && exit 1
